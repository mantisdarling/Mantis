# Render.com deployment configuration
# Docs: https://render.com/docs/yaml-spec

services:
  # ── NestJS API ────────────────────────────────────────────────────────
  - type: web
    name: mantis-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd apps/api && npm install && npx prisma generate && npm run build
    startCommand: cd apps/api && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: mantis-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: mantis-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://mantis-web.vercel.app  # update after Vercel deploy
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: us-east-1
    healthCheckPath: /health

  # ── Python ML Recommender ─────────────────────────────────────────────
  - type: web
    name: mantis-recommender
    runtime: python
    region: oregon
    plan: starter
    buildCommand: cd apps/recommender && pip install fastapi uvicorn scikit-learn numpy pandas httpx
    startCommand: cd apps/recommender && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: mantis-api
          property: host
    healthCheckPath: /health

databases:
  # ── PostgreSQL 15 ─────────────────────────────────────────────────────
  - name: mantis-db
    databaseName: mantis
    user: mantis
    region: oregon
    plan: starter

  # ── Redis 7 ──────────────────────────────────────────────────────────
  - name: mantis-redis
    type: redis
    region: oregon
    plan: starter
    ipAllowList: []
